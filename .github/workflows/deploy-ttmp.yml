name: Deploy TTMP
on:
  push:
    branches: [main]
    paths:
      - 'apps/ttmp/**'
      - 'packages/member-ui/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Build member-ui
        run: npx turbo build --filter=@vlp/member-ui
      - name: Build TTMP
        run: cd apps/ttmp && npm run cf:build
      - name: Deploy TTMP
        run: cd apps/ttmp && npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Flush KV cache
        run: cd apps/ttmp && npx wrangler kv bulk delete --namespace-id dda38413b0be42e6b7bcb3ff8308439e --force
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
