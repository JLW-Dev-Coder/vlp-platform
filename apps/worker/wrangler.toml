name = "virtuallaunch-pro-api"
main = "src/index.js"
compatibility_date = "2026-02-28"

# ---------------------------------------
# Routes
# ---------------------------------------

routes = [
  { pattern = "api.virtuallaunch.pro/*", zone_name = "virtuallaunch.pro" },
  { pattern = "*.websitelotto.virtuallaunch.pro/*", zone_name = "virtuallaunch.pro" }
]

# ---------------------------------------
# Observability
# ---------------------------------------

[observability]
enabled = true

[observability.logs]
enabled = true
invocation_logs = true

# ---------------------------------------
# Bindings
# ---------------------------------------

[[r2_buckets]]
binding = "R2_VIRTUAL_LAUNCH"
bucket_name = "virtuallaunch-pro"

[[r2_buckets]]
binding = "ONBOARDING_R2"
bucket_name = "virtuallaunch-pro"

[[d1_databases]]
binding = "DB"
database_name = "virtuallaunch-pro"
database_id = "079dfd69-dbf4-4070-bc91-51f837021795"
migrations_dir = "migrations"

[[kv_namespaces]]
binding = "ENRICHMENT_KV"
id = "eca3b78d3e564774bb4bdebed8ffa512"

# ---------------------------------------
# Cron Triggers
# ---------------------------------------

[triggers]
crons = [
  "0 4,16 * * *", # Every day 04:00 + 16:00 UTC - Reddit social monitor (tax subreddits)
  "0 6 * * *",    # Every day 06:00 UTC - WLVLP site generation + SCALE find-emails (Reoon Power)
  "0 8 * * *",    # Every day 08:00 UTC - SCALE validate-emails (Reoon quick mode)
  "0 9 * * 1",    # Every Monday 9am UTC - DVLP job matching
  "0 10 * * *",   # Every day 10am UTC - WLVLP auction settlement + FOIA lead enrichment + SCALE generate-batch
  "0 12 * * *",   # Every day 12:00 UTC - WLVLP SCALE batch generation
  "0 13 * * *",   # Every day 13:00 UTC - WLVLP asset page enrichment (crawl + conversion_leak_report)
  "0 14 * * *"    # Every day 14:00 UTC - SCALE email sending (TTMP + WLVLP)
]

