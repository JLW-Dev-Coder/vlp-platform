      background-attachment: fixed;
      box-sizing: border-box;
      position: relative;

    body::before {

      inset: 0;

      color: #fbbf24;
    }

    .badge-emerald {
      background: rgba(16, 185, 129, 0.15);
      border: 1px solid rgba(16, 185, 129, 0.3);
      color: #10b981;
    }

    .badge-red {

      border: 1px solid rgba(239, 68, 68, 0.3);

      align-items: center;
      justify-content: center;
      flex-shrink: 0;

      width: 20px;
      height: 20px;

      background: rgba(245, 158, 11, 0.15);

      color: #f1f5f9;
      margin: 8px 0 4px 0;
    }

    .stat-label {
      font-size: 13px;
      color: #94a3b8;
      text-align: center;
    }

    .btn-small {
      padding: 6px 12px;
      font-size: 12px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s ease;
      color: #f1f5f9;

      pointer-events: none;

      height: 36px;

      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 13px;
      color: white;
      flex-shrink: 0;

      width: 100%;
      height: 220px;
      position: relative;
      margin-top: 12px;
      overflow: hidden;

      background: rgba(15, 23, 42, 0.55);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 999px;
      display: inline-flex;
      gap: 6px;
      padding: 4px;

      border: 0;

      color: #94a3b8;

      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
      padding: 7px 12px;
      text-transform: uppercase;
      transition: all 0.2s ease;

    .chart-toggle-btn:hover {
      color: #e2e8f0;
    }

      background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
      color: #0f172a;
      box-shadow: 0 4px 12px rgba(245, 158, 11, 0.28);

      align-items: center;

      color: #cbd5e1;
      text-decoration: none;

      height: 18px;

      height: 16px;

      color: #f1f5f9;
      outline: none;
      padding: 12px 14px;

      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      color: #e2e8f0;
      font-size: 12px;
      font-weight: 600;

      gap: 10px;

    .filter-toolbar-group {
      display: flex;
      flex-direction: column;
      gap: 6px;

    .filter-toolbar-label {
      color: #94a3b8;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .table-filter-input {

      background: rgba(2, 6, 23, 0.52);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      color: #e2e8f0;
      font-size: 12px;
      font-weight: 600;
      outline: none;
      padding: 10px 12px;

    .table-filter-input::placeholder {

    }

    .due-client-card {

      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;

    .profile-toggle {
      align-items: center;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 999px;
      cursor: pointer;
      display: inline-flex;
      height: 28px;
      justify-content: flex-start;
      padding: 2px;
      position: relative;
      transition: all 0.2s ease;
      width: 52px;
    }

    .profile-toggle::after {
      background: #ffffff;
      border-radius: 999px;
      content: '';
      display: block;
      height: 22px;
      transition: transform 0.2s ease;
      width: 22px;
    }

    .profile-toggle.active {
      background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
      border-color: rgba(245, 158, 11, 0.35);
      box-shadow: 0 4px 12px rgba(245, 158, 11, 0.22);
    }

    .profile-toggle.active::after {
      transform: translateX(24px);
    }

    svg {
      width: 100%;
      height: 100%;
    }

    @media (max-width: 1024px) {
      .tm-pro-sidebar {
        display: none;
      }
    }

    @media (max-width: 768px) {
      .dashboard-grid {
        grid-template-columns: 1fr !important;
      }

      .topbar-search {
        min-width: 0;
      }
    }

</head>

    function setText(id, value) {
      const el = document.getElementById(id);
      if (!el) return false;
      el.textContent = String(value ?? '');
      return true;
    }

    function safeFirstName(fullName) {
      const s = String(fullName || '').trim();
      if (!s) return 'there';
      return s.split(/\s+/)[0] || 'there';
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function serviceLabel(client) {
      return `Tax Monitoring - ${client.tier || 'Bronze'}`;
    }

    function formatCurrency(amount) {
      return `$${Number(amount || 0).toLocaleString('en-US')}`;
    }

    function payoutEntries() {
      return TM_STATE.payoutQueue.slice().sort((a, b) => a.clientName.localeCompare(b.clientName));
    }

    function currentFilters() {
      return window.TM_FILTERS || {
        activeAlertsSeverity: 'all',
        clientPoolReady: 'all',
        clientReportStatus: 'all',
        clientsComplianceDue: 'all',

      };

    function profileToggles() {
      return window.TM_PROFILE_TOGGLES || {
        emailNotifications: true,
        inAppNotifications: true,
        smsNotifications: false,
        twoFactorAuthentication: false
      };
    }

    function setProfileToggle(key, value) {
      window.TM_PROFILE_TOGGLES = Object.assign({}, profileToggles(), { [key]: !!value });
    }

    function toggleProfileSetting(key) {
      const current = profileToggles();
      setProfileToggle(key, !current[key]);
    }

    function setFilter(key, value) {
      const nextFilters = Object.assign({}, currentFilters(), { [key]: value });
      if (key === 'clientsMonitoring' || key === 'clientsNameQuery' || key === 'clientsStatus') nextFilters.clientsPage = 1;
      window.TM_FILTERS = nextFilters;
    }

    function setClientsPage(page) {
      window.TM_FILTERS = Object.assign({}, currentFilters(), { clientsPage: Math.max(1, Number(page || 1)) });
    }

    function filteredAlerts() {
      const filters = currentFilters();
      return TM_STATE.alerts.filter((item) => filters.activeAlertsSeverity === 'all' || item.severity === filters.activeAlertsSeverity);
    }

    function filteredClientPool() {
      const filters = currentFilters();
      return TM_STATE.mockPool.filter((item) => {
        if (filters.clientPoolReady === 'ready') return item.readyForEsign;
        if (filters.clientPoolReady === 'inactive') return !item.readyForEsign;
        return true;
      });
    }

    function filteredClients() {
      const filters = currentFilters();
      const nameQuery = String(filters.clientsNameQuery || '').trim().toLowerCase();
      return TM_STATE.clients.filter((item) => {
        const monitoringMatch = filters.clientsMonitoring === 'all' || item.monitoring === filters.clientsMonitoring;
        const statusMatch = filters.clientsStatus === 'all' || item.status === filters.clientsStatus;
        const nameMatch = !nameQuery || item.clientName.toLowerCase().includes(nameQuery);
        return monitoringMatch && statusMatch && nameMatch;
      });
    }

    function paginatedClients() {
      const items = filteredClients();
      const pageSize = 20;
      const totalPages = Math.max(1, Math.ceil(items.length / pageSize));
      const currentPage = Math.min(Math.max(1, Number(currentFilters().clientsPage || 1)), totalPages);
      const startIndex = (currentPage - 1) * pageSize;
      return { currentPage, items: items.slice(startIndex, startIndex + pageSize), totalItems: items.length, totalPages };
    }

    function renderClientsPagination(currentPage, totalPages, totalItems) {
      if (totalPages <= 1) return `<div class="flex items-center justify-between gap-4 border-t border-slate-800/60 px-6 py-4"><div class="text-xs text-slate-500">Showing ${totalItems} client${totalItems === 1 ? '' : 's'}</div><div class="text-xs text-slate-500">Page 1 of 1</div></div>`;
      const pageButtons = Array.from({ length: totalPages }, (_, index) => {
        const page = index + 1;
        const active = page === currentPage;
        return `<button class="btn-small ${active ? 'gradient-btn-amber text-slate-950' : 'btn-outline'} px-3 py-2 text-xs font-semibold" data-clients-page="${page}" type="button">${page}</button>`;
      }).join('');
      return `<div class="flex flex-col gap-4 border-t border-slate-800/60 px-6 py-4 md:flex-row md:items-center md:justify-between"><div class="text-xs text-slate-500">Showing page ${currentPage} of ${totalPages} · ${totalItems} clients</div><div class="flex flex-wrap items-center gap-2"><button class="btn-small btn-outline px-3 py-2 text-xs font-semibold" data-clients-page="${Math.max(1, currentPage - 1)}" type="button" ${currentPage === 1 ? 'disabled style="opacity:.45;cursor:not-allowed;"' : ''}>Previous</button>${pageButtons}<button class="btn-small btn-outline px-3 py-2 text-xs font-semibold" data-clients-page="${Math.min(totalPages, currentPage + 1)}" type="button" ${currentPage === totalPages ? 'disabled style="opacity:.45;cursor:not-allowed;"' : ''}>Next</button></div></div>`;
    }

    function filteredComplianceDue() {
      const filters = currentFilters();

    }

    function drawRevenueChart() {
      const canvas = document.getElementById('revenue-chart');
      if (!canvas) return false;
      const ctx = canvas.getContext('2d');
      if (!ctx) return false;
      const displayWidth = Math.max(320, Math.floor((canvas.parentElement ? canvas.parentElement.clientWidth : 320)));
      const displayHeight = 220;
      const dpr = Math.max(window.devicePixelRatio || 1, 1);
      canvas.style.width = displayWidth + 'px';
      canvas.style.height = displayHeight + 'px';
      canvas.width = Math.floor(displayWidth * dpr);
      canvas.height = Math.floor(displayHeight * dpr);
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.scale(dpr, dpr);
      ctx.clearRect(0, 0, displayWidth, displayHeight);
      const series = payoutChartSeries();
      const data = series.values.slice();
      const labels = series.labels.slice();
      const max = Math.max(...data, 1);
      const chartLeft = 18, chartRight = displayWidth - 18, chartTop = 18, chartBottom = 162;
      const chartWidth = chartRight - chartLeft, chartHeight = chartBottom - chartTop, slotWidth = chartWidth / data.length, barWidth = Math.min(42, slotWidth * 0.58), radius = 12;
      function roundedRect(x, y, width, height, r) { const safeR = Math.min(r, width / 2, height / 2); ctx.beginPath(); ctx.moveTo(x + safeR, y); ctx.lineTo(x + width - safeR, y); ctx.quadraticCurveTo(x + width, y, x + width, y + safeR); ctx.lineTo(x + width, y + height - safeR); ctx.quadraticCurveTo(x + width, y + height, x + width - safeR, y + height); ctx.lineTo(x + safeR, y + height); ctx.quadraticCurveTo(x, y + height, x, y + height - safeR); ctx.lineTo(x, y + safeR); ctx.quadraticCurveTo(x, y, x + safeR, y); ctx.closePath(); }
      ctx.strokeStyle = 'rgba(148, 163, 184, 0.10)'; ctx.lineWidth = 1;
      for (let i = 0; i < 4; i += 1) { const y = chartTop + (chartHeight / 3) * i; ctx.beginPath(); ctx.moveTo(chartLeft, y); ctx.lineTo(chartRight, y); ctx.stroke(); }
      ctx.fillStyle = 'rgba(148, 163, 184, 0.72)'; ctx.font = '11px "DM Sans", sans-serif'; ctx.textAlign = 'left'; ctx.fillText(formatCurrency(max), chartLeft, 12);
      data.forEach((value, index) => {
        const barHeight = Math.max(18, (value / max) * chartHeight);
        const x = chartLeft + slotWidth * index + (slotWidth - barWidth) / 2;
        const y = chartBottom - barHeight;
        const glowGradient = ctx.createLinearGradient(0, y, 0, chartBottom); glowGradient.addColorStop(0, 'rgba(251, 191, 36, 0.35)'); glowGradient.addColorStop(1, 'rgba(217, 119, 6, 0.02)');
        ctx.fillStyle = glowGradient; roundedRect(x, y, barWidth, barHeight, radius); ctx.fill();
        const barGradient = ctx.createLinearGradient(0, y, 0, chartBottom); barGradient.addColorStop(0, '#fbbf24'); barGradient.addColorStop(0.55, '#f59e0b'); barGradient.addColorStop(1, '#d97706');
        ctx.fillStyle = barGradient; roundedRect(x, y + 2, barWidth, Math.max(12, barHeight - 2), radius - 2); ctx.fill();
        ctx.fillStyle = 'rgba(255, 255, 255, 0.10)'; roundedRect(x + 2, y + 4, Math.max(4, barWidth - 4), Math.max(6, barHeight * 0.18), Math.max(3, radius - 5)); ctx.fill();
        ctx.fillStyle = 'rgba(148, 163, 184, 0.78)'; ctx.font = '11px "DM Sans", sans-serif'; ctx.textAlign = 'center'; ctx.fillText(labels[index], x + barWidth / 2, displayHeight - 18);
        ctx.fillStyle = 'rgba(226, 232, 240, 0.88)'; ctx.font = '10px "DM Sans", sans-serif'; ctx.fillText(formatCurrency(value), x + barWidth / 2, y - 8);
      });
      return true;
    }

      console.assert(paginatedClients().totalPages === 2, 'clients page should split 37 clients into 2 pages');
      console.assert(renderPayoutsPage().includes('data-filter-key="payoutsStatus"'), 'payouts page should include dropdown filters');
      console.assert(renderActiveAlertsPage().includes('data-filter-key="activeAlertsSeverity"'), 'active alerts page should include dropdown filters');
      console.assert(renderTranscriptChangesPage().includes('data-filter-key="transcriptChangesSeverity"'), 'transcript changes page should include dropdown filters');
      window.TM_SELECTED_CLIENT_ID = 'u9';
      console.assert(renderClientDetailPage().includes('eSign 2848'), 'Olivia Brooks should show eSign 2848');
      window.TM_SELECTED_CLIENT_ID = 'u7';
      console.assert(renderClientDetailPage().includes('eSign 2848'), 'Carlos Vega should show eSign 2848');
      console.assert(renderEsignPage().includes('data-client-open="u9"'), 'eSign page should open Olivia Brooks CRM record');
      console.assert(renderEsignPage().includes('data-client-open="u7"'), 'eSign page should open Carlos Vega CRM record');
      console.assert(TM_STATE.clients.filter((client) => client.status === 'eSign 2848').length === 12, 'eSign queue should include 12 clients to match dashboard stats');
      console.assert(renderEsignPage().includes('12 waiting'), 'eSign page should show 12 waiting clients');
      console.assert(renderEsignPage().includes('Client eSigned 2848. The rep section is ready for your review/eSignature.'), 'eSign page should show unified rep-ready message');
      console.assert(TM_STATE.clients.length === 37, 'clients list should match dashboard active client total');
      console.assert(TM_STATE.clients.some((c) => c.clientName === 'Carlos Vega'), 'client list should include Carlos Vega');
      console.assert(TM_STATE.clients.some((c) => c.clientName === 'Olivia Brooks'), 'client list should include Olivia Brooks');
      console.assert(renderClientsPage().includes('37 active clients aligned with the dashboard total.'), 'clients page should reference 37 active clients');
      console.assert(renderDashboard().includes('canvas id="revenue-chart"'), 'dashboard should render revenue chart canvas');
      console.assert(renderDashboard().includes('Monthly'), 'dashboard should render monthly chart toggle');
      console.assert(renderDashboard().includes('Quarterly'), 'dashboard should render quarterly chart toggle');
      console.assert(renderDashboard().includes('Yearly'), 'dashboard should render yearly chart toggle');
      console.assert(document.querySelector('[data-page-link="help-center"]'), 'topbar should link help icon to help center');
      console.assert(document.querySelector('[data-page-link="receipts"]'), 'topbar should link credit card icon to receipts');
      console.assert(document.querySelector('[data-page-link="profile"]'), 'topbar should link profile icon to profile page');
      console.assert(payoutChartSeries().labels.length === 12, 'monthly chart should default to 12 labels');
      window.TM_PAYOUT_CHART_VIEW = 'quarterly';
      console.assert(payoutChartSeries().labels.length === 4, 'quarterly chart should use 4 labels');
      window.TM_PAYOUT_CHART_VIEW = 'yearly';
      console.assert(payoutChartSeries().labels.length === 3, 'yearly chart should use yearly labels');
      window.TM_PAYOUT_CHART_VIEW = 'monthly';
      console.assert(drawRevenueChart() === true, 'drawRevenueChart should render successfully when canvas exists');
      console.assert(TM_STATE.mockPool.length === 3, 'client pool should have three mock records');
      console.assert(renderPayoutsPage().includes('$510'), 'payouts page should render queue-derived amounts');
      console.assert(renderPayoutsPage().includes('SUCCESS'), 'payouts page should use actual PayPal statuses');
      console.assert(renderPayoutsPage().includes('PENDING'), 'payouts page should show actual non-success statuses');
      console.assert(payoutEntries().some((entry) => entry.status === 'SUCCESS'), 'payout queue should include SUCCESS statuses');
    }

    document.addEventListener('DOMContentLoaded', () => {
      setText('sidebar-user-name', defaultConfig.user_name);
      setText('sidebar-account-label', defaultConfig.account_label);
      setText('topbar-user-name', defaultConfig.user_name);

      document.querySelectorAll('a.nav-item[data-page], a[data-page-link]').forEach((el) => {
        el.addEventListener('click', (event) => {
          event.preventDefault();
          const page = el.getAttribute('data-page') || el.getAttribute('data-page-link');
          if (!page) return;
          window.TM_ACTIVE_PAGE = page;
          renderCurrentPage();
        });
      });

      document.addEventListener('change', (event) => {
        const filterSelect = event.target.closest('select[data-filter-key]');
        if (!filterSelect) return;
        const filterKey = filterSelect.getAttribute('data-filter-key');
        if (filterKey === 'clientsComplianceDue') return;
        setFilter(filterKey, filterSelect.value);
        renderCurrentPage();
      });

      document.addEventListener('input', (event) => {
        const filterInput = event.target.closest('input[data-filter-input]');
        if (!filterInput) return;
        setFilter(filterInput.getAttribute('data-filter-input'), filterInput.value);
        renderCurrentPage();
      });

      document.addEventListener('click', (event) => {
        const openBtn = event.target.closest('[data-client-open]');
        if (openBtn) {
          event.preventDefault();
          window.TM_SELECTED_CLIENT_ID = openBtn.getAttribute('data-client-open');
          window.TM_ACTIVE_PAGE = 'client-detail';
          renderCurrentPage();
          return;
        }
        const nameBtn = event.target.closest('[data-client-name]');
        if (nameBtn) {
          event.preventDefault();
          const clientId = findClientIdByName(nameBtn.getAttribute('data-client-name'));
          if (!clientId) return;
          window.TM_SELECTED_CLIENT_ID = clientId;
          window.TM_ACTIVE_PAGE = 'client-detail';
          renderCurrentPage();
          return;
        }
        const dueBtn = event.target.closest('[data-due-client]');
        if (dueBtn) {
          event.preventDefault();
          window.TM_SELECTED_COMPLIANCE_ID = dueBtn.getAttribute('data-due-client');
          window.TM_ACTIVE_PAGE = 'compliance-report-form';
          renderCurrentPage();
          return;
        }
        const profileToggleButton = event.target.closest('button[data-profile-toggle]');
        if (profileToggleButton) {
          event.preventDefault();
          const key = profileToggleButton.getAttribute('data-profile-toggle');
          if (!key) return;
          toggleProfileSetting(key);
          renderCurrentPage();
          return;
        }
        const pageButton = event.target.closest('button[data-page-link]');
        if (pageButton) {
          event.preventDefault();
          const page = pageButton.getAttribute('data-page-link');
          if (!page) return;
          window.TM_ACTIVE_PAGE = page;
          renderCurrentPage();
          return;
        }
        const chartToggle = event.target.closest('button[data-chart-view]');
        if (chartToggle) {
          event.preventDefault();
          const view = chartToggle.getAttribute('data-chart-view');
          if (!view) return;
          window.TM_PAYOUT_CHART_VIEW = view;
          renderCurrentPage();
          return;
        }
        const pageNavButton = event.target.closest('button[data-clients-page]');
        if (pageNavButton) {
          event.preventDefault();
          if (pageNavButton.disabled) return;
          setClientsPage(pageNavButton.getAttribute('data-clients-page'));
          window.TM_ACTIVE_PAGE = 'clients';
          renderCurrentPage();
        }
      });

      window.TM_ACTIVE_PAGE = 'dashboard';
      window.TM_PAYOUT_CHART_VIEW = 'monthly';
      window.TM_SELECTED_CLIENT_ID = 'u2';
      window.TM_SELECTED_COMPLIANCE_ID = 'cd1';
      renderCurrentPage();
      runSmokeTests();
    });
  </script>
</body>
