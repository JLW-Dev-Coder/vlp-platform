  <script>
    (function () {
      const currentPath = window.location.pathname.replace(/\/+$/, '') || '/app/dashboard.html';
      const activeClasses = [
        'border-purple-400/20',
        'bg-gradient-to-r',
        'from-violet-700/18',
        'via-purple-700/12',
        'to-indigo-800/14',
        'text-white',
        'shadow-[inset_0_1px_0_rgba(255,255,255,0.03)]'
      ];

      document.querySelectorAll('[data-nav-href]').forEach(function (link) {
        const targetPath = String(link.getAttribute('data-nav-href') || '').replace(/\/+$/, '');
        const icon = link.querySelector('svg');
        const isActive = targetPath === currentPath;

        if (isActive) {
          activeClasses.forEach(function (cls) {
            link.classList.add(cls);
          });
          if (icon) {
            icon.classList.remove('text-slate-400');
            icon.classList.add('text-violet-200');
          }
        } else {
          activeClasses.forEach(function (cls) {
            link.classList.remove(cls);
          });
          if (icon) {
            icon.classList.remove('text-violet-200');
            icon.classList.add('text-slate-400');
          }
        }
      });
    })();
  </script>
