<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>International Tax Explorer</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  
  
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&amp;family=Space+Mono:wght@400;700&amp;display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; padding: 0; }
    
    :root {
      --bg-color: #0a0a1a;
      --surface-color: #1a1a2e;
      --text-color: #ffffff;
      --primary-color: #00ffd5;
      --secondary-color: #ff00aa;
    }
    
    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg-color);
      color: var(--text-color);
      overflow-x: hidden;
    }
    
    /* Entry Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }
    
    @keyframes rotateIn {
      from { opacity: 0; transform: rotate(-10deg) scale(0.9); }
      to { opacity: 1; transform: rotate(0) scale(1); }
    }
    
    @keyframes flipIn {
      from { opacity: 0; transform: perspective(400px) rotateY(-90deg); }
      to { opacity: 1; transform: perspective(400px) rotateY(0); }
    }
    
    @keyframes bounceIn {
      0% { opacity: 0; transform: scale(0.3); }
      50% { transform: scale(1.05); }
      70% { transform: scale(0.9); }
      100% { opacity: 1; transform: scale(1); }
    }
    
    /* Continuous Animations */
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.8; }
    }
    
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    
    @keyframes wobble {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(-5deg); }
      75% { transform: rotate(5deg); }
    }
    
    @keyframes swing {
      0%, 100% { transform: rotate(0deg); }
      20% { transform: rotate(15deg); }
      40% { transform: rotate(-10deg); }
      60% { transform: rotate(5deg); }
      80% { transform: rotate(-5deg); }
    }
    
    @keyframes jello {
      0%, 100% { transform: scale(1, 1); }
      30% { transform: scale(1.25, 0.75); }
      40% { transform: scale(0.75, 1.25); }
      50% { transform: scale(1.15, 0.85); }
      65% { transform: scale(0.95, 1.05); }
      75% { transform: scale(1.05, 0.95); }
    }
    
    @keyframes glowPulse {
      0%, 100% { box-shadow: 0 0 20px var(--primary-color), 0 0 40px var(--primary-color); }
      50% { box-shadow: 0 0 40px var(--primary-color), 0 0 80px var(--secondary-color); }
    }
    
    @keyframes morph {
      0%, 100% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
      50% { border-radius: 30% 60% 70% 40% / 50% 60% 30% 60%; }
    }
    
    @keyframes twinkle {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.2); }
    }
    
    @keyframes orbit {
      from { transform: rotate(0deg) translateX(20px) rotate(0deg); }
      to { transform: rotate(360deg) translateX(20px) rotate(-360deg); }
    }
    
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    
    @keyframes hueRotate {
      from { filter: hue-rotate(0deg); }
      to { filter: hue-rotate(360deg); }
    }
    
    @keyframes rubberBand {
      0% { transform: scale(1); }
      30% { transform: scaleX(1.25) scaleY(0.75); }
      40% { transform: scaleX(0.75) scaleY(1.25); }
      50% { transform: scaleX(1.15) scaleY(0.85); }
      65% { transform: scaleX(0.95) scaleY(1.05); }
      75% { transform: scaleX(1.05) scaleY(0.95); }
      100% { transform: scale(1); }
    }
    
    @keyframes typewriter {
      from { width: 0; }
      to { width: 100%; }
    }
    
    @keyframes textGlow {
      0%, 100% { text-shadow: 0 0 10px var(--primary-color), 0 0 20px var(--primary-color); }
      50% { text-shadow: 0 0 20px var(--secondary-color), 0 0 40px var(--secondary-color); }
    }
    
    @keyframes ripple {
      0% { transform: scale(0); opacity: 1; }
      100% { transform: scale(4); opacity: 0; }
    }
    
    @keyframes shine {
      0% { left: -100%; }
      100% { left: 200%; }
    }
    
    @keyframes letterSpacing {
      0%, 100% { letter-spacing: 0.1em; }
      50% { letter-spacing: 0.3em; }
    }
    
    @keyframes wave {
      0%, 100% { transform: translateY(0) rotate(0); }
      25% { transform: translateY(-5px) rotate(2deg); }
      75% { transform: translateY(5px) rotate(-2deg); }
    }
    
    @keyframes progressPulse {
      0%, 100% { stroke-dashoffset: 0; }
    }
    
    @keyframes bouncingDots {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    
    @keyframes cubeFlip {
      0% { transform: perspective(1000px) rotateY(0) rotateX(0); }
      25% { transform: perspective(1000px) rotateY(90deg) rotateX(0); }
      50% { transform: perspective(1000px) rotateY(180deg) rotateX(90deg); }
      75% { transform: perspective(1000px) rotateY(270deg) rotateX(0); }
      100% { transform: perspective(1000px) rotateY(360deg) rotateX(0); }
    }
    
    /* Animation Classes */
    .fade-up { animation: fadeUp 0.8s ease-out forwards; }
    .scale-in { animation: scaleIn 0.6s ease-out forwards; }
    .rotate-in { animation: rotateIn 0.7s ease-out forwards; }
    .flip-in { animation: flipIn 0.6s ease-out forwards; }
    .bounce-in { animation: bounceIn 0.8s ease-out forwards; }
    
    .float { animation: float 3s ease-in-out infinite; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .spin { animation: spin 3s linear infinite; }
    .bounce { animation: bounce 1s ease-in-out infinite; }
    .wobble { animation: wobble 1s ease-in-out infinite; }
    .swing { animation: swing 2s ease-in-out infinite; }
    .jello { animation: jello 1s ease-in-out; }
    .glow-pulse { animation: glowPulse 2s ease-in-out infinite; }
    .morph { animation: morph 8s ease-in-out infinite; }
    .twinkle { animation: twinkle 2s ease-in-out infinite; }
    .orbit { animation: orbit 4s linear infinite; }
    .gradient-shift { 
      background-size: 200% 200%; 
      animation: gradientShift 3s ease infinite; 
    }
    .hue-rotate { animation: hueRotate 5s linear infinite; }
    .rubber-band { animation: rubberBand 0.8s ease-out; }
    .text-glow { animation: textGlow 2s ease-in-out infinite; }
    .letter-spacing { animation: letterSpacing 2s ease-in-out infinite; }
    .wave { animation: wave 2s ease-in-out infinite; }
    .cube-flip { animation: cubeFlip 2s ease-in-out forwards; }
    
    /* Hover Effects */
    .hover-lift { transition: transform 0.3s ease, box-shadow 0.3s ease; }
    .hover-lift:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0, 255, 213, 0.3); }
    
    .hover-scale { transition: transform 0.3s ease; }
    .hover-scale:hover { transform: scale(1.1); }
    
    .hover-glow { transition: box-shadow 0.3s ease, filter 0.3s ease; }
    .hover-glow:hover { 
      box-shadow: 0 0 30px var(--primary-color); 
      filter: brightness(1.2);
    }
    
    .hover-shake:hover { animation: wobble 0.5s ease-in-out; }
    .hover-rubber:hover { animation: rubberBand 0.8s ease-out; }
    .hover-jello:hover { animation: jello 0.8s ease-out; }
    
    /* Stars Background */
    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      animation: twinkle 2s ease-in-out infinite;
    }
    
    /* Map Container */
    .map-container {
      position: relative;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      border-radius: 20px;
      animation: glowPulse 4s ease-in-out infinite;
    }
    
    .map-border {
      position: absolute;
      inset: -4px;
      background: linear-gradient(45deg, var(--primary-color), var(--secondary-color), #ffff00, var(--primary-color));
      border-radius: 24px;
      z-index: -1;
      animation: morph 8s ease-in-out infinite, gradientShift 3s ease infinite;
      background-size: 300% 300%;
    }
    
    /* Country Markers */
    .country-marker {
      position: absolute;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      transition: all 0.3s ease;
      z-index: 10;
    }
    
    .country-marker::before {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
      z-index: -1;
      opacity: 0.5;
      animation: pulse 2s ease-in-out infinite;
    }
    
    .country-marker:hover {
      transform: scale(1.3);
      z-index: 20;
    }
    
    .country-marker:hover::before {
      animation: glowPulse 0.5s ease-in-out infinite;
      opacity: 1;
    }
    
    .country-marker.explored {
      background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
    }
    
    .country-marker.explored::after {
      content: '✓';
      position: absolute;
      top: -5px;
      right: -5px;
      width: 18px;
      height: 18px;
      background: #00ff00;
      border-radius: 50%;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #000;
      font-weight: bold;
      animation: bounceIn 0.5s ease-out;
    }
    
    /* Popup */
    .popup-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease, visibility 0.3s ease;
    }
    
    .popup-overlay.active {
      opacity: 1;
      visibility: visible;
    }
    
    .popup-content {
      background: linear-gradient(135deg, var(--surface-color) 0%, #2a2a4e 100%);
      border-radius: 20px;
      padding: 30px;
      max-width: 500px;
      width: 90%;
      position: relative;
      transform: scale(0.8) rotateY(-90deg);
      transition: transform 0.5s ease;
      border: 2px solid transparent;
      background-clip: padding-box;
    }
    
    .popup-overlay.active .popup-content {
      transform: scale(1) rotateY(0);
      animation: bounceIn 0.6s ease-out;
    }
    
    .popup-content::before {
      content: '';
      position: absolute;
      inset: -2px;
      background: linear-gradient(45deg, var(--primary-color), var(--secondary-color), #ffff00);
      border-radius: 22px;
      z-index: -1;
      animation: gradientShift 3s ease infinite;
      background-size: 200% 200%;
    }
    
    .fun-fact-box {
      background: linear-gradient(135deg, #2a2a4e, #3a3a5e, #2a2a4e);
      background-size: 200% 200%;
      animation: gradientShift 3s ease infinite;
      border-radius: 12px;
      padding: 15px;
      margin-top: 15px;
    }
    
    /* Search Button */
    .search-btn {
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
      border: none;
      padding: 12px 24px;
      border-radius: 30px;
      color: #000;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .search-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
      animation: shine 2s infinite;
    }
    
    .search-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 30px var(--primary-color);
    }
    
    .search-btn .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.5);
      animation: ripple 0.6s ease-out;
    }
    
    /* Progress Ring */
    .progress-ring {
      transform: rotate(-90deg);
    }
    
    .progress-ring-circle {
      transition: stroke-dashoffset 0.5s ease;
      stroke-linecap: round;
    }
    
    /* Bouncing Dots Loader */
    .bouncing-dots span {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: var(--primary-color);
      border-radius: 50%;
      margin: 0 4px;
      animation: bouncingDots 0.6s ease-in-out infinite;
    }
    
    .bouncing-dots span:nth-child(2) { animation-delay: 0.1s; }
    .bouncing-dots span:nth-child(3) { animation-delay: 0.2s; }
    
    /* Success Modal */
    .success-modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
    }
    
    .success-modal.active {
      opacity: 1;
      visibility: visible;
    }
    
    .success-content {
      text-align: center;
      animation: cubeFlip 1s ease-out forwards;
    }
    
    .success-title {
      font-size: 3rem;
      font-weight: 800;
      background: linear-gradient(45deg, var(--primary-color), var(--secondary-color), #ffff00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: textGlow 2s ease-in-out infinite, letterSpacing 2s ease-in-out infinite;
    }
    
    /* Animated Icon Container */
    .icon-spin { animation: spin 3s linear infinite; }
    .icon-orbit { animation: orbit 4s linear infinite; }
    .icon-wobble { animation: wobble 1s ease-in-out infinite; }
    
    /* Tooltip */
    .tooltip {
      position: absolute;
      background: var(--surface-color);
      color: var(--text-color);
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 12px;
      white-space: nowrap;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
      z-index: 30;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
    }
    
    .tooltip::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 6px solid transparent;
      border-top-color: var(--surface-color);
    }
    
    .country-marker:hover .tooltip {
      opacity: 1;
      visibility: visible;
      transform: translateX(-50%) translateY(-5px);
      animation: fadeUp 0.3s ease-out;
    }
    
    /* Typewriter Effect */
    .typewriter {
      overflow: hidden;
      white-space: nowrap;
      animation: typewriter 2s steps(40) forwards;
    }
    
    /* Gradient Text */
    .gradient-text {
      background: linear-gradient(45deg, var(--primary-color), var(--secondary-color), #ffff00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      background-size: 200% 200%;
      animation: gradientShift 3s ease infinite;
    }
    
    /* World Map SVG Styling */
    .world-map path {
      fill: #2a2a4e;
      stroke: var(--primary-color);
      stroke-width: 0.5;
      transition: all 0.3s ease;
    }
    
    .world-map path:hover {
      fill: #3a3a5e;
      filter: brightness(1.3);
    }
    
    /* Search Dropdown */
    .search-dropdown {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: var(--surface-color);
      border-radius: 12px;
      margin-top: 8px;
      max-height: 200px;
      overflow-y: auto;
      opacity: 0;
      visibility: hidden;
      transform: translateY(-10px);
      transition: all 0.3s ease;
      z-index: 50;
    }
    
    .search-dropdown.active {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }
    
    .search-item {
      padding: 12px 16px;
      cursor: pointer;
      transition: all 0.3s ease;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    
    .search-item:hover {
      background: rgba(0, 255, 213, 0.1);
    }
    
    .search-item:last-child {
      border-bottom: none;
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
 </head>
 <body class="h-full">
  <div id="app" class="h-full w-full overflow-auto" style="background: var(--bg-color);"><!-- Animated Stars Background -->
   <div id="stars-container" class="fixed inset-0 pointer-events-none overflow-hidden"></div><!-- Main Container -->
   <div class="relative z-10 min-h-full p-6 md:p-10"><!-- Header -->

    </div>
   </div><!-- Country Popup -->
   <div id="popup-overlay" class="popup-overlay" onclick="closePopup(event)">

     <div class="flex items-center gap-4 mb-4"><span id="popup-flag" class="text-5xl float"></span>
      <div>

     </div>
     <div class="space-y-4">
      <div class="flex items-start gap-3"><span class="text-2xl icon-wobble">💰</span>
       <div>
        <h3 class="font-semibold text-primary-color">Tax Rate</h3>
        <p id="popup-tax-rate" class="text-gray-300"></p>
       </div>
      </div>
      <div class="flex items-start gap-3"><span class="text-2xl icon-spin">📋</span>
       <div>
        <h3 class="font-semibold text-primary-color">Key Treaties</h3>
        <p id="popup-treaties" class="text-gray-300"></p>
       </div>
      </div>
      <div class="flex items-start gap-3"><span class="text-2xl orbit" style="display: inline-block;">🌟</span>
       <div>
        <h3 class="font-semibold text-primary-color">Unique Rule</h3>
        <p id="popup-unique" class="text-gray-300"></p>
       </div>
      </div>
      <div class="fun-fact-box">
       <div class="flex items-center gap-2 mb-2"><span class="text-xl bounce">🎉</span>
        <h3 class="font-semibold" style="color: #ffff00;">Fun Fact</h3>
