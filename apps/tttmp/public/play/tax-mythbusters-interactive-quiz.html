<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tax Mythbusters Quiz</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&amp;family=Syne:wght@400;600;700;800&amp;display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    
    :root {
      --bg-dark: #0a0a1a;
      --surface: #1a1a2e;
      --text: #ffffff;
      --neon-teal: #00f5d4;
      --neon-pink: #ff006e;
      --neon-yellow: #fee440;
    }
    
    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg-dark);
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }
    
    /* Glowing border animation */
    @keyframes glowPulse {
      0%, 100% { box-shadow: 0 0 20px var(--neon-teal), 0 0 40px var(--neon-teal), 0 0 60px rgba(0, 245, 212, 0.3); }
      50% { box-shadow: 0 0 30px var(--neon-pink), 0 0 60px var(--neon-pink), 0 0 90px rgba(255, 0, 110, 0.3); }
    }
    
    @keyframes morphBorder {
      0%, 100% { border-radius: 20px; }
      25% { border-radius: 30px 10px 30px 10px; }
      50% { border-radius: 10px 30px 10px 30px; }
      75% { border-radius: 25px 15px 25px 15px; }
    }
    
    /* Entry animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.5); }
      to { opacity: 1; transform: scale(1); }
    }
    
    @keyframes rotateIn {
      from { opacity: 0; transform: rotate(-180deg) scale(0); }
      to { opacity: 1; transform: rotate(0) scale(1); }
    }
    
    @keyframes flipIn {
      from { opacity: 0; transform: perspective(600px) rotateY(-90deg); }
      to { opacity: 1; transform: perspective(600px) rotateY(0); }
    }
    
    @keyframes bounceIn {
      0% { opacity: 0; transform: scale(0.3); }
      50% { transform: scale(1.1); }
      70% { transform: scale(0.9); }
      100% { opacity: 1; transform: scale(1); }
    }
    
    /* Continuous animations */
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.9; }
    }
    
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    
    @keyframes wobble {
      0%, 100% { transform: rotate(-3deg); }
      50% { transform: rotate(3deg); }
    }
    
    @keyframes jello {
      0%, 100% { transform: skewX(0deg) skewY(0deg); }
      25% { transform: skewX(-5deg) skewY(-5deg); }
      50% { transform: skewX(4deg) skewY(4deg); }
      75% { transform: skewX(-2deg) skewY(-2deg); }
    }
    
    @keyframes twinkle {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.2); }
    }
    
    @keyframes orbit {
      from { transform: rotate(0deg) translateX(20px) rotate(0deg); }
      to { transform: rotate(360deg) translateX(20px) rotate(-360deg); }
    }
    
    @keyframes wave {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      25% { transform: translateY(-5px) rotate(5deg); }
      75% { transform: translateY(5px) rotate(-5deg); }
    }
    
    /* Text animations */
    @keyframes typewriter {
      from { width: 0; }
      to { width: 100%; }
    }
    
    @keyframes textGlow {
      0%, 100% { text-shadow: 0 0 10px var(--neon-teal), 0 0 20px var(--neon-teal); }
      50% { text-shadow: 0 0 20px var(--neon-pink), 0 0 40px var(--neon-pink), 0 0 60px var(--neon-pink); }
    }
    
    @keyframes gradientText {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    
    @keyframes letterSpacing {
      0%, 100% { letter-spacing: 0.05em; }
      50% { letter-spacing: 0.15em; }
    }
    
    /* Feedback animations */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-10px); }
      20%, 40%, 60%, 80% { transform: translateX(10px); }
    }
    
    @keyframes rubberBand {
      0% { transform: scale(1); }
      30% { transform: scaleX(1.25) scaleY(0.75); }
      40% { transform: scaleX(0.75) scaleY(1.25); }
      50% { transform: scaleX(1.15) scaleY(0.85); }
      65% { transform: scaleX(0.95) scaleY(1.05); }
      75% { transform: scaleX(1.05) scaleY(0.95); }
      100% { transform: scale(1); }
    }
    
    @keyframes flip3D {
      0% { transform: perspective(600px) rotateY(0); }
      100% { transform: perspective(600px) rotateY(360deg); }
    }
    
    @keyframes cubeRotate {
      0% { transform: perspective(600px) rotateX(0) rotateY(0); }
      50% { transform: perspective(600px) rotateX(180deg) rotateY(90deg); }
      100% { transform: perspective(600px) rotateX(360deg) rotateY(180deg); }
    }
    
    /* Button effects */
    @keyframes ripple {
      0% { transform: scale(0); opacity: 0.8; }
      100% { transform: scale(2.5); opacity: 0; }
    }
    
    @keyframes shine {
      0% { left: -100%; }
      100% { left: 100%; }
    }
    
    @keyframes badgePulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 var(--neon-yellow); }
      50% { transform: scale(1.1); box-shadow: 0 0 20px 10px rgba(254, 228, 64, 0.3); }
    }
    
    /* Progress ring */
    @keyframes progressFill {
      from { stroke-dashoffset: 283; }
    }
    
    @keyframes bouncingDots {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-10px); }
    }
    
    /* Equalizer effect */
    @keyframes equalizer {
      0%, 100% { height: 10px; }
      50% { height: 30px; }
    }
    
    /* Stars background */
    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      animation: twinkle 2s ease-in-out infinite;
    }
    
    /* Quiz container */
    .quiz-container {
      animation: fadeUp 0.8s ease-out, glowPulse 3s ease-in-out infinite, morphBorder 8s ease-in-out infinite;
      background: linear-gradient(135deg, var(--surface) 0%, #16213e 100%);
    }
    
    /* Title */
    .quiz-title {
      background: linear-gradient(90deg, var(--neon-teal), var(--neon-pink), var(--neon-yellow), var(--neon-teal));
      background-size: 300% 100%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientText 4s ease infinite, textGlow 2s ease-in-out infinite, scaleIn 0.6s ease-out;
    }
    
    /* Statement card */
    .statement-card {
      animation: flipIn 0.6s ease-out;
      transition: all 0.3s ease;
    }
    
    .statement-card:hover {
      animation: jello 0.8s ease;
      box-shadow: 0 0 30px var(--neon-teal);
    }
    
    .statement-card.reveal {
      animation: flip3D 0.8s ease-out;
    }
    
    .statement-card.correct {
      animation: rubberBand 0.8s ease;
      border-color: var(--neon-teal) !important;
      box-shadow: 0 0 40px var(--neon-teal);
    }
    
    .statement-card.incorrect {
      animation: shake 0.6s ease;
      border-color: var(--neon-pink) !important;
      box-shadow: 0 0 40px var(--neon-pink);
    }
    
    /* Statement text typewriter effect */
    .typewriter-text {
      overflow: hidden;
      white-space: nowrap;
      animation: typewriter 2s steps(40) 0.5s forwards;
      width: 0;
    }
    
    .typewriter-text.visible {
      width: 100%;
      white-space: normal;
    }
    
    /* Choice buttons */
    .choice-btn {
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
      animation: bounceIn 0.6s ease-out;
    }
    
    .choice-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      transition: 0.5s;
    }
    
    .choice-btn:hover::before {
      animation: shine 0.8s ease;
    }
    
    .choice-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 30px currentColor;
    }
    
    .choice-btn:active .ripple-effect {
      animation: ripple 0.6s ease-out;
    }
    
    .ripple-effect {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.4);
      width: 100px;
      height: 100px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      pointer-events: none;
    }
    
    /* Gradient button text */
    .gradient-btn-text {
      background: linear-gradient(90deg, #fff, var(--neon-yellow), #fff);
      background-size: 200% 100%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientText 2s ease infinite;
    }
    
    /* Infographic icons */
    .info-icon {
      animation: float 3s ease-in-out infinite, pulse 2s ease-in-out infinite;
    }
    
    .info-icon.spin {
      animation: spin 4s linear infinite;
    }
    
    .info-icon.orbit {
      animation: orbit 5s linear infinite;
    }
    
    .info-icon.wave {
      animation: wave 2s ease-in-out infinite;
    }
    
    /* Progress ring */
    .progress-ring {
      transform: rotate(-90deg);
    }
    
    .progress-ring-circle {
      stroke-dasharray: 283;
      stroke-dashoffset: 283;
      transition: stroke-dashoffset 0.5s ease;
    }
    
    /* Score badge */
    .score-badge {
      animation: badgePulse 2s ease-in-out infinite;
    }
    
    /* Bouncing dots loader */
    .bouncing-dot {
      animation: bouncingDots 1.4s ease-in-out infinite;
    }
    
    .bouncing-dot:nth-child(2) { animation-delay: 0.2s; }
    .bouncing-dot:nth-child(3) { animation-delay: 0.4s; }
    
    /* Equalizer bars */
    .equalizer-bar {
      animation: equalizer 0.8s ease-in-out infinite;
    }
    
    .equalizer-bar:nth-child(2) { animation-delay: 0.1s; }
    .equalizer-bar:nth-child(3) { animation-delay: 0.2s; }
    .equalizer-bar:nth-child(4) { animation-delay: 0.3s; }
    .equalizer-bar:nth-child(5) { animation-delay: 0.4s; }
    
    /* Next button */
    .next-btn {
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
    }
    
    .next-btn::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    }
    
    .next-btn:hover::after {
      animation: shine 0.6s ease;
    }
    
    .next-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(0, 245, 212, 0.4);
    }
    
    /* Success animation */
    .success-container {
      animation: cubeRotate 1.5s ease-out;
    }
    
    .success-text {
      animation: letterSpacing 2s ease-in-out infinite, textGlow 1.5s ease-in-out infinite;
    }
    
    /* Explanation fade */
    .explanation {
      animation: fadeUp 0.5s ease-out;
    }
    
    /* Tooltip */
    .tooltip {
      animation: pulse 2s ease-in-out infinite;
      transition: all 0.3s ease;
    }
    
    .tooltip:hover {
      transform: scale(1.1);
    }
    
    /* Hidden state */
    .hidden-anim {
      opacity: 0;
      pointer-events: none;
    }
    
    .visible-anim {
      opacity: 1;
      pointer-events: auto;
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  
 </head>
 <body class="h-full">
  <div id="app" class="h-full w-full overflow-auto" style="background: var(--bg-dark);"><!-- Animated stars background -->
   <div id="stars-container" class="fixed inset-0 overflow-hidden pointer-events-none"></div><!-- Main container -->
   <div class="relative z-10 min-h-full flex flex-col items-center justify-center p-4 md:p-8"><!-- Quiz Start Screen -->
    <div id="start-screen" class="quiz-container w-full max-w-3xl p-6 md:p-10 rounded-3xl border-2 border-opacity-50" style="border-color: var(--neon-teal);"><!-- Title with animations -->
     <div class="text-center mb-8">
      <h1 id="main-title" class="quiz-title text-3xl md:text-5xl font-extrabold mb-4 break-words" style="font-family: 'Syne', sans-serif; word-wrap: break-word; overflow-wrap: break-word;">Tax Mythbusters Quiz</h1>
      <p id="main-subtitle" class="text-xl md:text-2xl font-medium" style="color: var(--neon-yellow); animation: float 3s ease-in-out infinite;">Can you separate fact from fiction?</p>
     </div><!-- Animated icons -->
     <div class="flex justify-center gap-8 mb-8">
      <div class="info-icon text-5xl" style="animation-delay: 0s;">

      <div class="info-icon spin text-5xl" style="animation-delay: 0.2s;">
       📊
      </div>
      <div class="info-icon wave text-5xl" style="animation-delay: 0.4s;">

      </div>
      <div class="info-icon text-5xl" style="animation-delay: 0.6s;">
       📝
      </div>
     </div><!-- Start button -->
     <div class="text-center"><button id="start-btn" class="choice-btn px-12 py-4 rounded-full text-xl font-bold transition-all" style="background: linear-gradient(135deg, var(--neon-teal), var(--neon-pink)); color: var(--bg-dark);" onclick="startQuiz()"> <span class="gradient-btn-text">START QUIZ</span>
       <div class="ripple-effect"></div></button>
     </div><!-- Tooltip hint -->
     <div class="tooltip mt-6 text-center p-3 rounded-lg" style="background: rgba(255,255,255,0.1);"><span style="color: var(--text); font-size: 0.9rem;">💡 Tap your choice to reveal if it's a myth or fact!</span>
     </div>
    </div><!-- Quiz Game Screen (hidden initially) -->
    <div id="quiz-screen" class="hidden-anim w-full max-w-3xl transition-opacity duration-500"><!-- Progress and Score Header -->
     <div class="flex justify-between items-center mb-6 px-2"><!-- Progress Ring -->
      <div class="flex items-center gap-4">
       <div class="relative">
        <svg class="progress-ring w-16 h-16"><circle cx="32" cy="32" r="28" stroke="rgba(255,255,255,0.2)" stroke-width="4" fill="none" /> <circle id="progress-circle" class="progress-ring-circle" cx="32" cy="32" r="28" stroke="url(#progressGradient)" stroke-width="4" fill="none" stroke-linecap="round" /> <defs>
          <lineargradient id="progressGradient" x1="0%" y1="0%" x2="100%" y2="0%">
           <stop offset="0%" style="stop-color: var(--neon-teal)" />
           <stop offset="100%" style="stop-color: var(--neon-pink)" />
          </lineargradient>
         </defs>
        </svg><span id="progress-text" class="absolute inset-0 flex items-center justify-center text-sm font-bold" style="color: var(--text);">1/5</span>
       </div><!-- Equalizer effect -->
       <div class="flex items-end gap-1 h-8">
        <div class="equalizer-bar w-1 rounded-full" style="background: var(--neon-teal);"></div>
        <div class="equalizer-bar w-1 rounded-full" style="background: var(--neon-pink);"></div>
        <div class="equalizer-bar w-1 rounded-full" style="background: var(--neon-yellow);"></div>
        <div class="equalizer-bar w-1 rounded-full" style="background: var(--neon-teal);"></div>
        <div class="equalizer-bar w-1 rounded-full" style="background: var(--neon-pink);"></div>
       </div>
      </div><!-- Score Badge -->
      <div class="score-badge flex items-center gap-2 px-5 py-2 rounded-full" style="background: linear-gradient(135deg, var(--neon-yellow), #ffa500); color: var(--bg-dark);"><span class="text-xl">⭐</span> <span id="score-display" class="font-bold text-lg">0</span>
      </div>
     </div><!-- Statement Card -->
     <div id="statement-card" class="statement-card quiz-container p-6 md:p-8 rounded-3xl border-2 mb-6" style="border-color: var(--neon-pink);"><!-- Question number badge -->
      <div class="flex justify-center mb-4"><span id="question-badge" class="px-4 py-1 rounded-full text-sm font-semibold" style="background: var(--neon-pink); color: var(--bg-dark); animation: pulse 2s ease-in-out infinite;"> QUESTION 1 </span>
      </div><!-- Statement text -->
      <p id="statement-text" class="typewriter-text visible text-xl md:text-2xl text-center font-semibold leading-relaxed mb-6" style="color: var(--text);">Loading question...</p><!-- Orbiting decorative element -->
      <div class="flex justify-center mb-6">
       <div class="relative w-16 h-16">
        <div class="absolute inset-0 flex items-center justify-center text-3xl">

       </div>
      </div><!-- Choice Buttons -->
      <div id="choice-buttons" class="flex flex-col sm:flex-row gap-4 justify-center"><button class="choice-btn myth-btn px-10 py-4 rounded-full text-lg font-bold transition-all" style="background: linear-gradient(135deg, var(--neon-pink), #ff4444); color: white;" onclick="selectAnswer('myth')"> <span class="flex items-center gap-2"> <span class="text-2xl">🚫</span> <span>MYTH</span> </span>
        <div class="ripple-effect"></div></button> <button class="choice-btn fact-btn px-10 py-4 rounded-full text-lg font-bold transition-all" style="background: linear-gradient(135deg, var(--neon-teal), #00a896); color: white;" onclick="selectAnswer('fact')"> <span class="flex items-center gap-2"> <span class="text-2xl">✅</span> <span>FACT</span> </span>

     </div><!-- Answer Reveal Section (hidden initially) -->
     <div id="answer-reveal" class="hidden-anim quiz-container p-6 md:p-8 rounded-3xl border-2 mb-6 transition-opacity duration-500" style="border-color: var(--neon-yellow);"><!-- Answer badge -->
      <div class="flex justify-center mb-4"><span id="answer-badge" class="px-6 py-2 rounded-full text-lg font-bold" style="animation: rubberBand 0.8s ease;"> MYTH </span>
      </div><!-- Result icon -->
      <div id="result-icon" class="text-center text-6xl mb-4">
       ✅
      </div><!-- Explanation -->
      <div class="explanation">

       <p class="text-lg font-semibold" style="color: var(--bg-dark);">Your Score</p>
       <p id="final-score" class="text-5xl font-extrabold" style="color: var(--bg-dark);">0/5</p>

      <div class="flex justify-center gap-2 mb-8">
       <div class="bouncing-dot w-3 h-3 rounded-full" style="background: var(--neon-teal);"></div>
       <div class="bouncing-dot w-3 h-3 rounded-full" style="background: var(--neon-pink);"></div>
       <div class="bouncing-dot w-3 h-3 rounded-full" style="background: var(--neon-yellow);"></div>
      </div><!-- Restart button --> <button class="choice-btn px-10 py-4 rounded-full text-xl font-bold" style="background: linear-gradient(135deg, var(--neon-pink), var(--neon-teal)); color: white;" onclick="restartQuiz()"> <span>PLAY AGAIN 🔄</span>
       <div class="ripple-effect"></div></button>
     </div>
    </div>
   </div>
  </div>
  
 <script>
  const QUESTIONS = [
    {
      statement: "You don't have to file a tax return if you made less than $10,000.",
      answer: "myth",
      explanation: "Filing thresholds depend on filing status, age, and income type. Self-employment income of $400+ requires a return regardless, and you may want to file to claim refundable credits."
    },
    {
      statement: "The IRS can audit returns filed up to three years ago for most errors.",
      answer: "fact",
      explanation: "The standard statute of limitations is 3 years. It extends to 6 years for substantial under-reporting (25%+) and is unlimited for fraud or unfiled returns."
    },
    {
      statement: "Getting a big tax refund means you did your taxes right.",
      answer: "myth",
      explanation: "A large refund means you overpaid all year — you gave the IRS an interest-free loan. Adjusting withholding can put that money in your pocket sooner."
    },
    {
      statement: "Home office deductions automatically trigger an IRS audit.",
      answer: "myth",
      explanation: "Legitimate home office deductions are not a red flag. The space must be used regularly and exclusively for business, but claiming it correctly is perfectly safe."
    },
    {
      statement: "Tax extensions give you more time to file, but not more time to pay.",
      answer: "fact",
      explanation: "Form 4868 extends your filing deadline to October, but any tax owed is still due by the April deadline. Interest and penalties accrue on unpaid balances."
    }
  ];

  let currentQuestion = 0;
  let score = 0;

  const $ = (id) => document.getElementById(id);

  function show(el) { el.classList.remove('hidden-anim'); el.classList.add('visible-anim'); }
  function hide(el) { el.classList.add('hidden-anim'); el.classList.remove('visible-anim'); }

  function startQuiz() {
    currentQuestion = 0;
    score = 0;
    hide($('start-screen'));
    $('start-screen').style.display = 'none';
    show($('quiz-screen'));
    renderQuestion();
  }

  function renderQuestion() {
    const q = QUESTIONS[currentQuestion];
    $('statement-text').textContent = q.statement;
    $('question-badge').textContent = `QUESTION ${currentQuestion + 1}`;
    $('progress-text').textContent = `${currentQuestion + 1}/${QUESTIONS.length}`;
    $('score-display').textContent = String(score);

    const circle = $('progress-circle');
    const circumference = 283;
    const progress = currentQuestion / QUESTIONS.length;
    circle.style.strokeDashoffset = String(circumference - circumference * progress);

    const card = $('statement-card');
    card.classList.remove('correct', 'incorrect', 'reveal');
    hide($('answer-reveal'));
    document.querySelectorAll('#choice-buttons .choice-btn').forEach(b => b.disabled = false);
  }

  function selectAnswer(choice) {
    const q = QUESTIONS[currentQuestion];
    const correct = choice === q.answer;
    if (correct) score++;

    const card = $('statement-card');
    card.classList.add(correct ? 'correct' : 'incorrect');
    document.querySelectorAll('#choice-buttons .choice-btn').forEach(b => b.disabled = true);

    const badge = $('answer-badge');
    badge.textContent = q.answer.toUpperCase();
    if (q.answer === 'myth') {
      badge.style.background = 'linear-gradient(135deg, var(--neon-pink), #ff4444)';
      badge.style.color = 'white';
    } else {
      badge.style.background = 'linear-gradient(135deg, var(--neon-teal), #00a896)';
      badge.style.color = 'white';
    }
    $('result-icon').textContent = correct ? '🎉' : '💡';
    $('explanation-text').textContent = q.explanation;
    $('score-display').textContent = String(score);

    show($('answer-reveal'));
    $('answer-reveal').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function nextQuestion() {
    currentQuestion++;
    if (currentQuestion >= QUESTIONS.length) {
      finishQuiz();
    } else {
      renderQuestion();
    }
  }

  function finishQuiz() {
    hide($('quiz-screen'));
    show($('success-screen'));
    $('final-score').textContent = `${score}/${QUESTIONS.length}`;
    const pct = score / QUESTIONS.length;
    let msg = 'Keep learning — tax myths are sneaky!';
    if (pct === 1) msg = 'Perfect score! You\'re a tax myth buster!';
    else if (pct >= 0.8) msg = 'Great job! You know your tax facts.';
    else if (pct >= 0.6) msg = 'Nice work — a few myths slipped through.';
    $('performance-msg').textContent = msg;
  }

  function restartQuiz() {
    hide($('success-screen'));
    $('start-screen').style.display = '';
    show($('start-screen'));
    currentQuestion = 0;
    score = 0;
  }

  // Stars background
  document.addEventListener('DOMContentLoaded', () => {
    const container = document.getElementById('stars-container');
    if (container) {
      for (let i = 0; i < 50; i++) {
        const s = document.createElement('div');
        s.className = 'star';
        const size = Math.random() * 3 + 1;
        s.style.width = s.style.height = size + 'px';
        s.style.left = Math.random() * 100 + '%';
        s.style.top = Math.random() * 100 + '%';
        s.style.animationDelay = (Math.random() * 2) + 's';
        container.appendChild(s);
      }
    }
  });
 </script></body>
