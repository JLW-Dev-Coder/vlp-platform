<!-- games/tax-jargon-game.html -->
<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tax Jargon Game • Play • TaxTools Arcade</title>

  <!-- Canonical local assets (required) -->
  <link rel="icon" href="/assets/favicon.ico" />
  <link rel="stylesheet" href="/styles/site.css" />

  <!-- SDKs (required) -->
  
  

  <!-- Remote UI helpers allowed if local CSS does not provide them -->
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Fredoka+One&display=swap" rel="stylesheet" />

  <style>
    * { box-sizing: border-box; }

    .font-display { font-family: 'Fredoka One', cursive; }
    .font-body { font-family: 'Nunito', sans-serif; }

    .badge-glow { animation: pulse-glow 2s ease-in-out infinite; }
    .bounce-in { animation: bounce-in 0.5s ease-out; }
    .confetti { animation: confetti 3s ease-out forwards; }
    .drag-item { cursor: grab; touch-action: none; }
    .drag-item:active { cursor: grabbing; }
    .drop-zone { transition: all 0.2s ease; }
    .drop-zone.drag-over { background: rgba(59,130,246,0.08); border-color:#3b82f6; transform:scale(1.02); }
    .flip-card { perspective:1000px; }
    .flip-card-back { transform:rotateY(180deg); }
    .flip-card-front, .flip-card-back { backface-visibility:hidden; -webkit-backface-visibility:hidden; }
    .flip-card-inner { transition:transform 0.6s; transform-style:preserve-3d; }
    .flip-card.flipped .flip-card-inner { transform:rotateY(180deg); }
    .shake { animation:shake 0.3s ease-in-out; }

    @keyframes bounce-in {
      0% { transform:scale(0); opacity:0; }
      50% { transform:scale(1.1); }
      100% { transform:scale(1); opacity:1; }
    }

    @keyframes confetti {
      0% { transform:translateY(-100%) rotate(0deg); opacity:1; }
      100% { transform:translateY(100vh) rotate(720deg); opacity:0; }
    }

    @keyframes pulse-glow {
      0%,100% { box-shadow:0 0 20px rgba(34,197,94,0.25); }
      50% { box-shadow:0 0 40px rgba(34,197,94,0.45); }
    }

    @keyframes shake {
      0%,100% { transform:translateX(0); }
      25% { transform:translateX(-5px); }
      75% { transform:translateX(5px); }
    }

    .custom-scrollbar::-webkit-scrollbar {
      width: 8px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.1);
      border-radius: 4px;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.3);
      border-radius: 4px;
    }

    html, body { background: #020617; color: #fff; }

    body { box-sizing: border-box; }

    @keyframes pulse-indicator {
      0%, 100% {
        box-shadow: 0 0 12px rgba(16, 185, 129, 0.6), inset 0 0 6px rgba(255, 255, 255, 0.3);
      }
      50% {
        box-shadow: 0 0 20px rgba(16, 185, 129, 0.9), inset 0 0 8px rgba(255, 255, 255, 0.5);
      }
    }

.status-indicator {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 12px;
      height: 12px;
      background: linear-gradient(135deg, #10b981, #06b6d4);
      border-radius: 50%;
      box-shadow: 0 0 12px rgba(16, 185, 129, 0.6), inset 0 0 6px rgba(255, 255, 255, 0.3);
      animation: pulse-indicator 2s ease-in-out infinite;
      flex-shrink: 0;
    }

    .status-text {
      background: linear-gradient(135deg, #10b981 0%, #06b6d4 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 600;
    }
  </style>
</head>

<body class="h-full font-body bg-slate-950 text-white">

  <!-- PARTIAL:header -->

  <div id="app" class="h-full w-full overflow-auto custom-scrollbar" style="background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #4338ca 100%); padding-bottom: 6rem;">

      <!-- Home Screen -->
      <div id="home-screen" class="h-full w-full p-4 md:p-8 pb-24">
        <div class="max-w-6xl mx-auto">

          <header class="text-center mb-8 mt-[50px] bounce-in">
            <h1 id="main-title" class="font-display text-4xl md:text-6xl text-white mb-2 drop-shadow-lg">
              Tax Jargon Game
            </h1>
            <p id="main-subtitle" class="text-indigo-200 text-lg md:text-xl">Play quizzes, flashcards, and lightning rounds.</p>
          </header>

          <div class="bg-white/10 backdrop-blur-sm rounded-2xl p-6 mb-8 max-w-3xl mx-auto">
            <h2 class="font-display text-2xl text-white mb-4 text-center">📊 Your Progress</h2>
            <div class="flex flex-wrap justify-center items-center gap-8">
              <div class="text-center">
                <div class="text-4xl font-bold text-emerald-300" id="stat-terms">0</div>
                <p class="text-indigo-200">Terms Learned</p>
              </div>
              <div class="text-center">
                <div class="text-4xl font-bold text-blue-300" id="stat-quizzes">0</div>
                <p class="text-indigo-200">Quizzes Done</p>
              </div>
              <div class="text-center">
                <div class="text-4xl font-bold text-yellow-400" id="stat-badges">0</div>
                <p class="text-indigo-200">Badges</p>
              </div>
            </div>
          </div>

          <div class="space-y-3 max-w-3xl mx-auto">

            <button onclick="startFlashcards()" class="w-full bg-white/10 hover:bg-white/15 rounded-2xl p-5 flex items-center gap-4 shadow-xl border border-white/10 backdrop-blur-sm transition-all">
              <div class="flex-1 text-left">
                <div class="font-bold text-white text-lg">Flashcards</div>
                <div class="text-indigo-200 text-sm">Flip to learn definitions</div>
              </div>
            </button>

            <button onclick="startQuiz()" class="w-full bg-white/10 hover:bg-white/15 rounded-2xl p-5 flex items-center gap-4 shadow-xl border border-white/10 backdrop-blur-sm transition-all">
              <div class="flex-1 text-left">
                <div class="font-bold text-white text-lg">Start Quiz</div>
                <div class="text-indigo-200 text-sm">Multiple-choice questions</div>
              </div>
            </button>

            <button onclick="startLightning()" class="w-full bg-white/10 hover:bg-white/15 rounded-2xl p-5 flex items-center gap-4 shadow-xl border border-white/10 backdrop-blur-sm transition-all">
              <div class="flex-1 text-left">
                <div class="font-bold text-white text-lg">Lightning Round</div>
                <div class="text-indigo-200 text-sm">10 questions in 60 seconds</div>
              </div>
            </button>

            <button onclick="startIRSGame()" class="w-full bg-white/10 hover:bg-white/15 rounded-2xl p-5 flex items-center gap-4 shadow-xl border border-white/10 backdrop-blur-sm transition-all">
              <div class="flex-1 text-left">
                <div class="font-bold text-white text-lg">IRS Code Mini‑Game</div>
                <div class="text-indigo-200 text-sm">Match notice codes</div>
              </div>
            </button>

            <button onclick="showProgress()" class="w-full bg-white/10 hover:bg-white/15 rounded-2xl p-5 flex items-center gap-4 shadow-xl border border-white/10 backdrop-blur-sm transition-all">
              <div class="flex-1 text-left">
                <div class="font-bold text-white text-lg">Progress</div>
                <div class="text-indigo-200 text-sm">Achievements and scores</div>
              </div>
            </button>

          </div>

        </div>
      </div>
          </div>

        </div>
      </div>

    </div>

  <!-- PARTIAL:footer -->

  

</body>
</html>
